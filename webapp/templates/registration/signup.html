{% extends 'base.html' %}
{% block title %}Регистрация — Automatic Conspect{% endblock %}
{% block content %}
<section class="card" style="max-width:520px;margin:auto;">
  <h2>Регистрация</h2>
  <p class="muted">Создайте аккаунт для загрузки видео и получения конспектов на почту.</p>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Создать аккаунт</button>
  </form>
</section>
{% endblock %}
